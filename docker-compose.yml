services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  airflow:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env  # Load all environment variables from .env file
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data: